services:
  immich-cast:
    image: oven/bun:1-alpine
    container_name: immich-cast
    working_dir: /app
    env_file:
      - .env
    environment:
      TZ: America/Edmonton
      NODE_ENV: production
      PORT: 2284
    ports:
      - '2284:2284'
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./tsconfig.node.json:/app/tsconfig.node.json:ro
      - node_modules:/app/node_modules
      - dist:/app/dist
      - ./data:/app/data
    entrypoint: ['sh', '-c']
    command: ['apk add --no-cache tzdata >/dev/null && bun install && bun run build && bun run api']
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:2284/api/config').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 2s
      start_period: 30s
      retries: 3

volumes:
  node_modules:
  dist:
