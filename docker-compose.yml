services:
  immich-cast:
    image: node:24-alpine
    container_name: immich-cast
    working_dir: /app
    env_file:
      - .env
    environment:
      TZ: America/Edmonton
      NODE_ENV: production
      PORT: 2284
    ports:
      - "2284:2284"
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./tsconfig.node.json:/app/tsconfig.node.json:ro
      - node_modules:/app/node_modules
      - dist:/app/dist
    entrypoint: ["sh", "-c"]
    command: ["apk add --no-cache tzdata >/dev/null && npm install --include=dev --no-audit --no-fund && npm run build && npm run api"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2284/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  node_modules:
  dist:
